<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIE Defender - Space Combat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
            line-height: 1.8;
        }

        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
            text-align: right;
            line-height: 1.8;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #0f0;
            pointer-events: none;
            z-index: 50;
        }

        .crosshair-center {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #0f0;
        }

        .crosshair-line {
            position: absolute;
            background: #0f0;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #0f0;
            padding: 40px;
            text-align: center;
            z-index: 1000;
            min-width: 500px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px #0f0, inset 0 0 10px rgba(0, 255, 0, 0.1);
        }

        #menu h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #0f0, 0 0 60px #00aa00;
            letter-spacing: 4px;
        }

        #menu p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #888;
        }

        #startBtn {
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            padding: 15px 50px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #startBtn:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 30px #0f0, inset 0 0 10px #0f0;
        }

        #pauseMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #0f0;
            padding: 40px;
            text-align: center;
            z-index: 2000;
            display: none;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px #0f0;
        }

        #pauseMenu h2 {
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #0f0;
        }

        #pauseMenu button {
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #pauseMenu button:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .hidden {
            display: none !important;
        }

        .controls-text {
            font-size: 12px;
            margin-top: 20px;
            line-height: 1.8;
        }

        #fireMode {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0f0;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 10px #0f0; }
            50% { text-shadow: 0 0 20px #0f0, 0 0 40px #00ff00; }
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>⚔ TIE DEFENDER ⚔</h1>
        <p>SPACE COMBAT SIMULATOR</p>
        <div class="controls-text">
            <div><strong>MOVEMENT:</strong> ARROW KEYS / WASD</div>
            <div><strong>VERTICAL:</strong> Q / E</div>
            <div><strong>AIM:</strong> MOUSE MOVE</strong></div>
            <div><strong style="color: #00ff00; text-shadow: 0 0 20px #0f0;">⚡ FIRE: CLICK or SPACEBAR ⚡</strong></div>
            <div><strong>PAUSE:</strong> P</div>
        </div>
        <button id="startBtn">START GAME</button>
    </div>

    <div id="pauseMenu">
        <h2>⏸ PAUSED ⏸</h2>
        <button id="resumeBtn">RESUME</button>
        <button id="menuBtn">MAIN MENU</button>
    </div>

    <div id="hud">
        <div>⚠ THREAT LEVEL: <span id="threatLevel">--</span></div>
        <div>🛡 SHIELD: <span id="shield">100</span>%</div>
        <div>💥 WEAPONS: <span id="weapons">ONLINE</span></div>
        <div>👾 ENEMIES: <span id="enemies">8</span></div>
    </div>

    <div id="stats">
        <div>💣 TARGETS HIT: <span id="killCount">0</span></div>
        <div>🎯 ACCURACY: <span id="accuracy">0</span>%</div>
        <div>📡 DISTANCE: <span id="distance">0</span>m</div>
        <div>💫 SHOTS: <span id="ammo">∞</span></div>
    </div>

    <div id="crosshair">
        <div class="crosshair-center"></div>
    </div>

    <div id="fireMode">🔴 WEAPONS ARMED</div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
