<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIE Defender - Space Combat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
        }

        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 10px #0f0;
            z-index: 100;
            text-align: right;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid #0f0;
            pointer-events: none;
            z-index: 50;
        }

        .crosshair-center {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #0f0;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #0f0;
            padding: 40px;
            text-align: center;
            z-index: 1000;
            min-width: 450px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px #0f0;
        }

        #menu h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #0f0;
            letter-spacing: 3px;
        }

        #menu p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #888;
        }

        #startBtn {
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            padding: 15px 50px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #startBtn:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 30px #0f0, inset 0 0 10px #0f0;
        }

        #pauseMenu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #0f0;
            padding: 40px;
            text-align: center;
            z-index: 2000;
            display: none;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 30px #0f0;
        }

        #pauseMenu h2 {
            font-size: 32px;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #0f0;
        }

        #pauseMenu button {
            background: #0f0;
            color: #000;
            border: 2px solid #0f0;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        #pauseMenu button:hover {
            background: #000;
            color: #0f0;
            box-shadow: 0 0 20px #0f0;
        }

        .hidden {
            display: none !important;
        }

        .controls-text {
            font-size: 12px;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="menu">
        <h1>⚔ TIE DEFENDER ⚔</h1>
        <p>SPACE COMBAT SIMULATOR</p>
        <div class="controls-text">
            <div>ARROW KEYS / WASD - Move | Q/E - Up/Down</div>
            <div>CLICK - Fire | SPACE - Boost | P - Pause</div>
        </div>
        <button id="startBtn">START GAME</button>
    </div>

    <div id="pauseMenu">
        <h2>⏸ PAUSED ⏸</h2>
        <button id="resumeBtn">RESUME</button>
        <button id="menuBtn">MAIN MENU</button>
    </div>

    <div id="hud">
        <div>THREAT LEVEL: <span id="threatLevel">--</span></div>
        <div>SHIELD: <span id="shield">100</span>%</div>
        <div>WEAPONS: <span id="weapons">ONLINE</span></div>
    </div>

    <div id="stats">
        <div>TARGETS: <span id="killCount">0</span></div>
        <div>ACCURACY: <span id="accuracy">0</span>%</div>
        <div>DISTANCE: <span id="distance">0</span>m</div>
    </div>

    <div id="crosshair">
        <div class="crosshair-center"></div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
